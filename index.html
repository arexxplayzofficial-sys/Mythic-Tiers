<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythic Tiers - Live Minecraft PvP Rankings</title>
<meta name="description" content="PvP Club is the definitive ranking system for Minecraft PvP players.">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root { --bg: #0b0c10; --surface: #1f2833; --surface2: #2c3e50; --primary: #66fcf1; --primary2: #45a29e; --text: #c5c6c7; --text2: #8b8fa3; --white: #ffffff; }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
  body { background-color: var(--bg); color: var(--text); min-height: 100vh; background-image: radial-gradient(ellipse at 50% -10%, rgba(102, 252, 241, 0.25) 0%, rgba(69, 162, 158, 0.08) 35%, transparent 65%), repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(255,255,255,0.01) 15px, rgba(255,255,255,0.01) 30px); background-attachment: fixed; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  
  .animate-row { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }
  .animate-card { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }
  .modal-box { animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

  header { background: rgba(31, 40, 51, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--primary2); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
  .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--primary2)); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--bg); font-weight: bold; font-size: 18px; }
  .logo-text { font-size: 20px; font-weight: 800; color: var(--white); letter-spacing: -0.5px; }
  .logo-text span { color: var(--primary); }
  .nav-links { display: flex; gap: 20px; align-items: center; }
  .nav-links a { color: var(--text2); text-decoration: none; font-weight: 500; font-size: 14px; transition: color 0.2s; }
  .nav-links a:hover { color: var(--primary); }
  .nav-active { color: var(--primary) !important; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .announcement { background: linear-gradient(135deg, rgba(69,162,158,0.1), rgba(102,252,241,0.05)); border: 1px solid var(--primary2); border-radius: 8px; padding: 16px 20px; margin-bottom: 24px; display: flex; gap: 12px; animation: fadeIn 0.5s ease-out; }
  .ann-icon { color: var(--primary); font-size: 20px; }
  .ann-content h3 { color: var(--primary); font-size: 14px; margin-bottom: 4px; }
  .ann-content p { font-size: 13px; line-height: 1.4; color: var(--text); }

  .server-ip-box { background: var(--surface); border: 1px solid var(--surface2); border-radius: 8px; padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; animation: fadeIn 0.6s ease-out; }
  .ip-info h3 { color: var(--white); font-size: 16px; margin-bottom: 2px; }
  .ip-info p { color: var(--text2); font-size: 12px; }
  .ip-copy-container { display: flex; align-items: center; gap: 8px; background: var(--bg); padding: 6px 12px; border-radius: 6px; border: 1px solid var(--primary2); }
  .ip-text { color: var(--primary); font-family: monospace; font-weight: 700; font-size: 16px; }
  .copy-btn { background: var(--primary2); color: var(--bg); border: none; padding: 6px 12px; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 12px; transition: background 0.2s, transform 0.1s; }
  .copy-btn:hover { background: var(--primary); }
  .copy-btn:active { transform: scale(0.95); }

  .tabs { display: flex; gap: 6px; margin-bottom: 24px; border-bottom: 1px solid var(--surface); padding-bottom: 12px; overflow-x: auto; }
  .tab-btn { background: var(--surface); color: var(--text2); border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .tab-btn:hover { background: var(--surface2); color: var(--white); transform: translateY(-1px); }
  .tab-btn.active { background: var(--primary); color: var(--bg); }

  .lb-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
  .lb-table th { background: var(--bg); color: var(--text2); font-size: 12px; text-transform: uppercase; padding: 12px 16px; text-align: left; }
  .lb-table td { padding: 12px 16px; border-bottom: 1px solid var(--surface2); vertical-align: middle; }
  .player-cell { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.1s; }
  .player-cell:hover { transform: translateX(4px); }
  .player-cell:hover .p-name { color: var(--primary); }
  .mc-skin { width: 36px; height: 36px; image-rendering: pixelated; border-radius: 4px; background: var(--bg); transition: transform 0.2s; }
  .player-cell:hover .mc-skin { transform: scale(1.1); }
  .p-name { font-weight: 600; color: var(--white); font-size: 14px; transition: color 0.2s; }
  .p-title { font-size: 11px; color: var(--primary); font-weight: 600; }
  .region-badge { background: var(--bg); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; border: 1px solid var(--surface2); transition: transform 0.2s; }
  .region-badge:hover { transform: scale(1.1); }
  .r-na { color: var(--primary); } .r-eu { color: #ff9800; } .r-as { color: #03a9f4; } .r-au { color: #3f51b5; } .r-sa { color: #ff5722; }
  .tier-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tier-tag { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 4px; transition: transform 0.2s; }
  .tier-tag:hover { transform: translateY(-2px); }
  .tier-tag span { opacity: 0.7; font-weight: 400; font-size: 9px; }
  .t-ht1 { background: rgba(255,87,34,0.15); color: #ff5722; } .t-ht2 { background: rgba(255,152,0,0.15); color: #ff9800; }
  .t-ht3 { background: rgba(255,193,7,0.15); color: #ffc107; } .t-ht4 { background: rgba(139,195,74,0.15); color: #8bc34a; }
  .t-lt1 { background: rgba(3,169,244,0.15); color: #03a9f4; } .t-lt2 { background: rgba(33,150,243,0.15); color: #2196f3; }
  .t-lt3 { background: rgba(63,81,181,0.15); color: #3f51b5; } .t-lt4 { background: rgba(103,58,183,0.15); color: #673ab7; }

  .tier-section { margin-bottom: 40px; animation: fadeInUp 0.5s ease-out forwards; opacity: 0; }
  .tier-header { font-size: 20px; font-weight: 700; color: var(--white); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--surface2); }
  .tier-1 .tier-header { color: #ffc107; border-color: #ffc10740; } .tier-2 .tier-header { color: #ff5722; border-color: #ff572240; }
  .tier-3 .tier-header { color: #03a9f4; border-color: #03a9f440; } .tier-4 .tier-header { color: #8bc34a; border-color: #8bc34a40; }
  .tier-5 .tier-header { color: #9c27b0; border-color: #9c27b040; }
  .tier-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
  .tier-card { background: var(--surface); border: 1px solid var(--surface2); border-radius: 8px; padding: 20px 10px; text-align: center; transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; cursor: pointer; }
  .tier-card:hover { transform: translateY(-6px); border-color: var(--primary2); box-shadow: 0 8px 20px rgba(102, 252, 241, 0.1); }
  .tier-card .mc-skin { width: 64px; height: 64px; margin: 0 auto 12px; display: block; transition: transform 0.3s; }
  .tier-card:hover .mc-skin { transform: scale(1.1); }
  .tier-card .p-name { font-size: 13px; margin-bottom: 6px; transition: color 0.2s; }
  .tier-card:hover .p-name { color: var(--primary); }

  /* --- PROFILE MODAL (Redesigned) --- */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
  .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease-out; }
  .modal-box { background: var(--surface); border: 1px solid var(--surface2); border-radius: 16px; width: 420px; max-width: 95vw; overflow: hidden; }
  .modal-banner { height: 80px; background: linear-gradient(135deg, var(--primary2), var(--bg)); position: relative; }
  .close-modal { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; transition: background 0.2s; z-index: 10; display: flex; align-items: center; justify-content: center; }
  .close-modal:hover { background: rgba(255,0,0,0.6); }
  
  .profile-header { text-align: center; margin-top: -48px; padding: 0 24px 20px; border-bottom: 1px solid var(--surface2); }
  .profile-avatar { width: 96px; height: 96px; image-rendering: pixelated; border-radius: 50%; border: 4px solid var(--surface); margin-bottom: 12px; transition: transform 0.3s; }
  .profile-avatar:hover { transform: scale(1.1) rotate(5deg); }
  .profile-username { font-size: 24px; font-weight: 800; color: var(--white); margin-bottom: 8px; }
  .profile-badges { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .p-badge { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-master { background: linear-gradient(135deg, #ffc107, #ff9800); color: #000; }
  .badge-ace { background: linear-gradient(135deg, #03a9f4, #2196f3); color: #fff; }
  .badge-warrior { background: linear-gradient(135deg, #4caf50, #2e7d32); color: #fff; }
  .badge-region { background: var(--bg); color: var(--text2); border: 1px solid var(--surface2); }

  .profile-body { padding: 20px 24px; }
  .profile-stat-box { background: var(--bg); border: 1px solid var(--surface2); border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 20px; }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--white); }
  .stat-sub { font-size: 13px; color: var(--primary); font-weight: 600; }

  .profile-tiers-title { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 700; }
  .profile-tiers-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .p-tier-item { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; background: var(--bg); border: 1px solid var(--surface2); transition: transform 0.2s, border-color 0.2s; }
  .p-tier-item:hover { transform: translateY(-2px); border-color: var(--primary2); }
  .p-tier-icon { font-size: 16px; }
  .p-tier-name { color: var(--text2); font-size: 12px; }
  .p-tier-rank { font-weight: 800; }

  .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: var(--primary); color: var(--bg); padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; z-index: 2000; transition: bottom 0.3s ease; }
  .toast.show { bottom: 40px; }
  .loading-box { text-align: center; padding: 60px; color: var(--text2); }
  .empty-state { text-align: center; padding: 60px; color: var(--text2); }
  footer { text-align: center; padding: 24px; color: var(--text2); font-size: 12px; border-top: 1px solid var(--surface); margin-top: 40px; }
</style>
</head>
<body>

<header>
  <nav class="nav-container">
    <a href="index.html" class="logo">
      <div class="logo-icon"><i class="fas fa-khanda"></i></div>
      <div class="logo-text">Mythic <span>Tiers</span></div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-active"><i class="fas fa-trophy"></i> Rankings</a>
      <a href="api.html"><i class="fas fa-book"></i> API Docs</a>
      <a href="https://discord.gg/MxUjNNMWdu" target="_blank"><i class="fab fa-discord"></i> Discord</a>
    </div>
  </nav>
</header>

<main class="container">
  <section class="announcement">
    <div class="ann-icon"><i class="fas fa-rocket"></i></div>
    <div class="ann-content">
      <h3>Live Custom API Integration!</h3>
      <p>This site is powered by the Mythic Tiers custom API.</p>
    </div>
  </section>

  <section class="server-ip-box">
    <div class="ip-info">
      <h3><i class="fas fa-server"></i> Server IP</h3>
      <p>Join the club and start climbing the ranks</p>
    </div>
    <div class="ip-copy-container">
      <span class="ip-text">play.snipernetwork.top</span>
      <button class="copy-btn" onclick="copyIP()">Copy</button>
    </div>
  </section>

  <nav class="tabs" id="tabContainer"></nav>
  <section id="contentArea"><div class="loading-box"><i class="fas fa-spinner fa-spin"></i> Loading API Data...</div></section>
</main>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-box">
    <div class="modal-banner">
      <button class="close-modal" onclick="closeProfile()"><i class="fas fa-times"></i></button>
    </div>
    <div class="profile-header">
      <img id="profileAvatar" class="profile-avatar" src="" alt="Avatar">
      <div id="profileUsername" class="profile-username"></div>
      <div id="profileBadges" class="profile-badges"></div>
    </div>
    <div class="profile-body">
      <div id="profilePosition" class="profile-stat-box"></div>
      <div class="profile-tiers-title">Gamemode Tiers & Ranks</div>
      <div id="profileTiers" class="profile-tiers-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">IP Copied!</div>
<footer><p>&copy; 2026 Mythic Tiers. Powered by MMJ API.</p></footer>

<script>
  const SUPABASE_URL = 'https://yxzxlyxtxysynbimpins.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4enhseXh0eHlzeW5iaW1waW5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzI4MDMsImV4cCI6MjA5NDIwODgwM30.l8GMu54hozDFL8kLA4_LJcm0sLSTEgArMpQ1GK3Tbgo';
  
  const API_BASE = `${SUPABASE_URL}/rest/v1`;
  const headers = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };

  const catIcons = { overall: "🏆", vanilla: "", uhc: "🍎", pot: "🧪", nethop: "🔥", smp: "🌍", sword: "⚔️", axe: "🪓", mace: "🔨" };
  const dbCategories = ['vanilla', 'uhc', 'pot', 'nethop', 'smp', 'sword', 'axe', 'mace'];
  const regionNames = { 'NA': 'North America', 'EU': 'Europe', 'AS': 'Asia', 'AU': 'Australia', 'SA': 'South America', 'ME': 'Middle East', 'AF': 'Africa' };
  
  let activeTab = 'overall';
  let allPlayersCache = []; // Cache players to calculate ranks without extra API calls

  function init() { renderTabs(); renderContent(); }
  function renderTabs() {
    const tabs = document.getElementById('tabContainer');
    const categories = ['overall', ...dbCategories];
    tabs.innerHTML = categories.map(cat => {
      const name = cat.charAt(0).toUpperCase() + cat.slice(1);
      return `<button class="tab-btn ${cat === activeTab ? 'active' : ''}" onclick="switchTab('${cat}')">${catIcons[cat]} ${name}</button>`;
    }).join('');
  }

  function switchTab(tab) { activeTab = tab; renderTabs(); renderContent(); }

  async function renderContent() {
    const content = document.getElementById('contentArea');
    content.innerHTML = `<div class="loading-box"><i class="fas fa-spinner fa-spin"></i> Fetching ${activeTab} rankings...</div>`;
    
    // Fetch and cache all players if not already cached
    if (allPlayersCache.length === 0) {
      try {
        const res = await fetch(`${API_BASE}/players?select=*&order=points.desc.nullslast`, { headers });
        allPlayersCache = await res.json();
      } catch (e) {
        content.innerHTML = `<div style="text-align:center; padding:60px; color:#ff4f4f;"><h3>API Error</h3><p>Could not load data.</p></div>`;
        return;
      }
    }

    if (activeTab === 'overall') { await renderOverall(content); } else { await renderCategory(content, activeTab); }
  }

  async function renderOverall(container) {
    try {
      const data = allPlayersCache;
      if (!data || data.length === 0) { container.innerHTML = `<div class="empty-state"><h3>No Players Found</h3><p>Add players via the <a href="admin.html" style="color:var(--primary)">Admin Panel</a></p></div>`; return; }
      
      let html = `<table class="lb-table"><thead><tr><th>#</th><th>Player</th><th>Tiers</th></tr></thead><tbody>`;
      data.forEach((p, index) => {
        let tierTags = '';
        dbCategories.forEach(cat => {
          if (p[cat]) { const tierStr = p[cat].toUpperCase(); tierTags += `<div class="tier-tag t-${tierStr.toLowerCase()}"><span>${catIcons[cat]} ${cat}</span> ${tierStr}</div>`; }
        });
        html += `<tr class="animate-row" style="animation-delay: ${index * 50}ms">
          <td style="font-weight:700; color:var(--text2)">${index + 1}</td>
          <td><div class="player-cell" onclick="openProfile('${p.username}')">
            <img class="mc-skin" src="https://mc-heads.net/avatar/${p.username}/48" alt="${p.username}" loading="lazy">
            <div><span class="p-name">${p.username}</span><span class="p-title"><i class="fas fa-shield-halved"></i> ${p.points || 0} pts</span></div>
          </div></td>
          <td><div class="tier-tags">${tierTags}</div></td>
        </tr>`;
      });
      html += `</tbody></table>`;
      container.innerHTML = html;
    } catch (e) { container.innerHTML = `<div style="text-align:center; padding:60px; color:#ff4f4f;"><h3>API Error</h3><p>Could not load overall rankings.</p></div>`; }
  }

  async function renderCategory(container, catName) {
    try {
      const data = allPlayersCache;
      if (!data || data.length === 0) { container.innerHTML = `<div class="empty-state"><h3>No Players Found</h3><p>Add players via the <a href="admin.html" style="color:var(--primary)">Admin Panel</a></p></div>`; return; }
      
      const tiers = { 1: [], 2: [], 3: [], 4: [], 5: [] };
      data.forEach(p => {
        if (p[catName] && p[catName].trim() !== '') {
          const tierVal = parseInt(p[catName].replace(/[^0-9]/g, ''));
          if (tierVal >= 1 && tierVal <= 5) tiers[tierVal].push(p);
        }
      });

      let html = ''; let sectionDelay = 0; let hasAnyTiers = false;
      for (const [tierNum, players] of Object.entries(tiers)) {
        if (players.length === 0) continue;
        hasAnyTiers = true;
        html += `<section class="tier-section tier-${tierNum}" style="animation-delay: ${sectionDelay}ms"><div class="tier-header"><i class="fas fa-layer-group"></i> Tier ${tierNum}</div><div class="tier-grid">`;
        let cardDelay = 0;
        players.forEach(p => {
          html += `<article class="tier-card animate-card" style="animation-delay: ${cardDelay}ms" onclick="openProfile('${p.username}')">
            <img class="mc-skin" src="https://mc-heads.net/avatar/${p.username}/48" alt="${p.username}" loading="lazy">
            <div class="p-name">${p.username}</div>
            <span class="region-badge r-${(p.region || 'na').toLowerCase()}">${p.region || 'NA'}</span>
          </article>`; cardDelay += 60;
        });
        html += `</div></section>`; sectionDelay += 150;
      }
      container.innerHTML = hasAnyTiers ? html : `<div class="empty-state"><h3>No ${catName} tiers found</h3></div>`;
    } catch (e) { container.innerHTML = `<div style="text-align:center; padding:60px; color:#ff4f4f;"><h3>API Error</h3></div>`; }
  }

  function getPlayerTitle(points) {
    if (points >= 300) return { text: 'Combat Master', class: 'badge-master' };
    if (points >= 200) return { text: 'Combat Ace', class: 'badge-ace' };
    return { text: 'Warrior', class: 'badge-warrior' };
  }

  // Helper function to calculate rank dynamically
  function getCategoryRank(username, catName) {
    // Filter players who actually have a tier in this category
    const playersInCat = allPlayersCache.filter(p => p[catName] && p[catName].trim() !== '');
    
    // Sort by points descending
    playersInCat.sort((a, b) => (b.points || 0) - (a.points || 0));
    
    // Find the 1-based index of the player
    const rank = playersInCat.findIndex(p => p.username === username) + 1;
    return rank > 0 ? rank : null;
  }

  async function openProfile(username) {
    document.getElementById('profileUsername').innerText = username;
    document.getElementById('profileAvatar').src = `https://mc-heads.net/avatar/${username}/128`;
    document.getElementById('profileBadges').innerHTML = '<i class="fas fa-spinner fa-spin" style="color:var(--text2)"></i>';
    document.getElementById('profilePosition').innerHTML = '';
    document.getElementById('profileTiers').innerHTML = '';
    document.getElementById('profileModal').classList.add('active');

    try {
      // Find the player in our cached data
      const p = allPlayersCache.find(player => player.username === username);
      
      if (p) {
        const pts = p.points || 0;
        const titleInfo = getPlayerTitle(pts);
        const regionFull = regionNames[p.region] || p.region;

        // Calculate Overall Rank (1-based index from the main sorted cache)
        const overallRank = allPlayersCache.findIndex(player => player.username === username) + 1;

        // Badges
        document.getElementById('profileBadges').innerHTML = `
          <span class="p-badge ${titleInfo.class}"><i class="fas fa-crown"></i> ${titleInfo.text}</span>
          <span class="p-badge badge-region"><i class="fas fa-globe-americas"></i> ${regionFull}</span>
        `;

        // Position Box
        document.getElementById('profilePosition').innerHTML = `
          <div class="stat-label">Position</div>
          <div class="stat-value">#${overallRank}</div>
          <div class="stat-sub">OVERALL (${pts} points)</div>
        `;

        // Tiers List with automatic specific rank calculation
        let tiersHtml = '';
        dbCategories.forEach(cat => {
          if (p[cat] && p[cat].trim() !== '') {
            const tierStr = p[cat].toUpperCase();
            const catRank = getCategoryRank(username, cat); // Get auto rank for this specific gamemode
            
            tiersHtml += `
              <div class="p-tier-item t-${tierStr.toLowerCase()}">
                <span class="p-tier-icon">${catIcons[cat]}</span>
                <span class="p-tier-name">${cat.charAt(0).toUpperCase() + cat.slice(1)}</span>
                <span class="p-tier-rank">${tierStr} ${catRank ? `(#${catRank})` : ''}</span>
              </div>
            `;
          }
        });
        document.getElementById('profileTiers').innerHTML = tiersHtml || '<span style="color:var(--text2); font-size:13px;">No tiers assigned yet.</span>';
      } else {
        document.getElementById('profileBadges').innerHTML = '<span class="p-badge badge-region">Unknown Player</span>';
      }
    } catch (e) {
      document.getElementById('profileBadges').innerHTML = '<span style="color:red;">Error loading</span>';
    }
  }

  function closeProfile() { document.getElementById('profileModal').classList.remove('active'); }
  function copyIP() { navigator.clipboard.writeText("mcpvp.club"); showToast("IP Copied to clipboard!"); }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
  window.onclick = function(event) { if (event.target == document.getElementById('profileModal')) closeProfile(); }
  init();
</script>
</body>
</html>
